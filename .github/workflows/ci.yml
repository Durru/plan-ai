name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  release-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Release check
        run: bash scripts/release-check.sh
